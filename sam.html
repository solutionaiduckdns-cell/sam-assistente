<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Sam - Assistente Voz IA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      background-color: #000;
      color: white;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      overflow: hidden;
    }

    .orb-container {
      position: relative;
    }

    .orb {
      width: 200px;
      height: 200px;
      background: radial-gradient(circle at 30% 30%, #00ffff, #004d4d);
      border-radius: 50%;
      box-shadow: 0 0 40px #00ffff88;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
      transition: background 0.3s, box-shadow 0.3s;
    }

    .ring {
      position: absolute;
      top: -20px;
      left: -20px;
      width: 240px;
      height: 240px;
      border-radius: 50%;
      box-shadow: 0 0 30px #00ffff55;
      animation: pulse 2s infinite;
      z-index: 1;
      pointer-events: none;
    }

    .orb.listening {
      background: radial-gradient(circle at 30% 30%, #00ffcc, #005c5c);
      box-shadow: 0 0 60px #00ffff;
    }

    .orb.playing {
      background: radial-gradient(circle at 30% 30%, #ff00ff, #520052);
      box-shadow: 0 0 60px #ff00ff99;
    }

    .orb.error-state {
      background: radial-gradient(circle at 30% 30%, #ff4444, #550000);
      box-shadow: 0 0 60px #ff000099;
    }

    .ring.listening {
      animation: vibrate 0.4s infinite;
      box-shadow: 0 0 40px #00ffff99;
    }

    .ring.playing {
      animation: glow 1s ease-in-out infinite alternate;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.6; }
      50% { transform: scale(1.2); opacity: 1; }
    }

    @keyframes vibrate {
      0% { transform: scale(1.05); }
      50% { transform: scale(1.18); }
      100% { transform: scale(1.05); }
    }

    @keyframes glow {
      0% { box-shadow: 0 0 40px #ff00ff88; }
      100% { box-shadow: 0 0 70px #ff00ffcc; }
    }

    .status-text {
      margin-top: 28px;
      font-size: 16px;
      color: #888;
      font-weight: 300;
      font-style: italic;
      letter-spacing: 0.03em;
      text-align: center;
      max-width: 280px;
      min-height: 24px;
      transition: color 0.3s;
    }

    .status-text.active {
      color: #00ffff;
    }

    .status-text.playing {
      color: #ff00ff;
    }

    .status-text.error {
      color: #ff4444;
    }
  </style>
</head>
<body>
  <div class="orb-container">
    <div id="ring" class="ring"></div>
    <div id="orb" class="orb" title="Clique para falar com o Sam"></div>
  </div>
  <div id="status" class="status-text">Clique para falar</div>

  <script>
    const orb = document.getElementById('orb');
    const ring = document.getElementById('ring');
    const statusText = document.getElementById('status');

    let recognition;
    let lastTranscript = "";
    let silenceTimeout;
    let falando = false;
    let micPermitido = false;

    // Beep gerado localmente — sem dependência externa
    function playBeep(freq = 880, duration = 0.25) {
      try {
        const ctx = new AudioContext();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = freq;
        osc.type = 'sine';
        gain.gain.setValueAtTime(0.25, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + duration);
      } catch (e) {
        console.warn("AudioContext não disponível:", e);
      }
    }

    function setStatus(msg, mode = '') {
      statusText.textContent = msg;
      statusText.className = 'status-text';
      if (mode) statusText.classList.add(mode);
    }

    async function pedirPermissaoMicrofone() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        // Para o stream imediatamente — só precisávamos da permissão
        stream.getTracks().forEach(t => t.stop());
        micPermitido = true;
        return true;
      } catch (e) {
        micPermitido = false;
        if (e.name === 'NotAllowedError' || e.name === 'PermissionDeniedError') {
          setStatus("Permissão de microfone negada. Libere nas configurações do navegador.", 'error');
        } else {
          setStatus("Microfone não encontrado ou indisponível.", 'error');
        }
        return false;
      }
    }

    async function startRecognition() {
      if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
        setStatus("Navegador não suporta reconhecimento de voz. Use Chrome.", 'error');
        return;
      }

      // Pede permissão explícita antes de tudo
      if (!micPermitido) {
        setStatus("Solicitando acesso ao microfone...", 'active');
        const ok = await pedirPermissaoMicrofone();
        if (!ok) return;
      }

      playBeep(880, 0.2);

      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      recognition = new SpeechRecognition();
      recognition.lang = 'pt-BR';
      recognition.interimResults = true;
      recognition.continuous = true;
      lastTranscript = "";

      recognition.onstart = () => {
        orb.classList.add('listening');
        ring.classList.add('listening');
        setStatus("Ouvindo...", 'active');
      };

      recognition.onresult = (event) => {
        for (let i = event.resultIndex; i < event.results.length; ++i) {
          if (event.results[i].isFinal) {
            lastTranscript = event.results[i][0].transcript;
          }
        }
        clearTimeout(silenceTimeout);
        silenceTimeout = setTimeout(stopRecognition, 1200);
      };

      recognition.onerror = (event) => {
        console.error('Erro recognition:', event.error);
        orb.classList.remove('listening');
        ring.classList.remove('listening');

        if (event.error === 'not-allowed') {
          micPermitido = false;
          setStatus("Microfone bloqueado. Verifique as permissões do site.", 'error');
        } else if (event.error === 'no-speech') {
          setStatus("Nenhuma fala detectada. Tente novamente.", '');
        } else {
          setStatus("Erro: " + event.error, 'error');
        }
      };

      recognition.onend = () => {
        orb.classList.remove('listening');
        ring.classList.remove('listening');
      };

      recognition.start();
    }

    async function stopRecognition() {
      if (!recognition) return;
      recognition.stop();
      orb.classList.remove('listening');
      ring.classList.remove('listening');

      if (!lastTranscript.trim()) {
        setStatus("Clique para falar");
        return;
      }

      setStatus("Processando...", 'active');

      try {
        const response = await fetch("https://webhook.solutionai.duckdns.org/webhook/receber-audio", {
          method: "POST",
          mode: "cors",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ pergunta: lastTranscript.trim() })
        });

        if (!response.ok) throw new Error("Erro na resposta do servidor: " + response.status);

        const blob = await response.blob();
        const audioURL = URL.createObjectURL(blob);

        if (falando) {
          console.warn("Já estou falando, ignorando nova resposta.");
          return;
        }
        falando = true;

        const audio = new Audio(audioURL);

        audio.onplay = () => {
          orb.classList.add('playing');
          ring.classList.add('playing');
          setStatus("Respondendo...", 'playing');
        };

        audio.onended = () => {
          falando = false;
          orb.classList.remove('playing');
          ring.classList.remove('playing');
          setStatus("Clique para falar");
          playBeep(660, 0.15); // beep de confirmação
        };

        audio.onerror = () => {
          falando = false;
          orb.classList.remove('playing');
          ring.classList.remove('playing');
          orb.classList.add('error-state');
          setStatus("Tema delicado! Reformule a pergunta.", 'error');
          setTimeout(() => orb.classList.remove('error-state'), 3000);
        };

        audio.play();

      } catch (err) {
        falando = false;
        console.error("Erro ao enviar ou processar resposta:", err);
        setStatus("Erro ao falar com a IA. Tente novamente.", 'error');
        setTimeout(() => setStatus("Clique para falar"), 3000);
      }
    }

    orb.addEventListener('click', () => {
      if (falando) return; // ignora clique enquanto fala
      if (recognition && recognition.running) {
        stopRecognition();
      } else {
        startRecognition();
      }
    });
  </script>
</body>
</html>
