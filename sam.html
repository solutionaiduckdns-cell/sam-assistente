<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Sam - Assistente Voz IA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #000;
      color: white;
      font-family: 'Segoe UI', -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      overflow: hidden;
      user-select: none;
    }

    .orb-container {
      position: relative;
    }

    .orb {
      width: 200px;
      height: 200px;
      background: radial-gradient(circle at 30% 30%, #00ffff, #004d4d);
      border-radius: 50%;
      box-shadow: 0 0 40px #00ffff88;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
      transition: background 0.3s, box-shadow 0.3s;
    }

    .orb:hover {
      box-shadow: 0 0 60px #00ffffcc;
    }

    .orb:active {
      transform: scale(0.95);
    }

    .ring {
      position: absolute;
      top: -20px;
      left: -20px;
      width: 240px;
      height: 240px;
      border-radius: 50%;
      box-shadow: 0 0 30px #00ffff55;
      animation: pulse 2s infinite;
      z-index: 1;
      pointer-events: none;
    }

    .orb.listening {
      background: radial-gradient(circle at 30% 30%, #00ffcc, #005c5c);
      box-shadow: 0 0 60px #00ffff;
    }

    .orb.playing {
      background: radial-gradient(circle at 30% 30%, #ff00ff, #520052);
      box-shadow: 0 0 60px #ff00ff99;
    }

    .orb.error-state {
      background: radial-gradient(circle at 30% 30%, #ff4444, #550000);
      box-shadow: 0 0 60px #ff000099;
    }

    .orb.processing {
      animation: think 1.2s ease-in-out infinite;
    }

    .ring.listening {
      animation: vibrate 0.4s infinite;
      box-shadow: 0 0 40px #00ffff99;
    }

    .ring.playing {
      animation: glow 1s ease-in-out infinite alternate;
    }

    .ring.processing {
      animation: think-ring 1.2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.6; }
      50% { transform: scale(1.2); opacity: 1; }
    }

    @keyframes vibrate {
      0% { transform: scale(1.05); }
      50% { transform: scale(1.18); }
      100% { transform: scale(1.05); }
    }

    @keyframes glow {
      0% { box-shadow: 0 0 40px #ff00ff88; }
      100% { box-shadow: 0 0 70px #ff00ffcc; }
    }

    @keyframes think {
      0%, 100% {
        background: radial-gradient(circle at 30% 30%, #00ffff, #004d4d);
        box-shadow: 0 0 30px #00ffff44;
      }
      50% {
        background: radial-gradient(circle at 30% 30%, #ffaa00, #553300);
        box-shadow: 0 0 50px #ffaa0088;
      }
    }

    @keyframes think-ring {
      0%, 100% { transform: scale(1); opacity: 0.4; }
      50% { transform: scale(1.3); opacity: 0.8; }
    }

    .status-text {
      margin-top: 28px;
      font-size: 16px;
      color: #888;
      font-weight: 300;
      font-style: italic;
      letter-spacing: 0.03em;
      text-align: center;
      max-width: 300px;
      min-height: 48px;
      transition: color 0.3s;
      line-height: 1.5;
    }

    .status-text.active {
      color: #00ffff;
    }

    .status-text.playing {
      color: #ff00ff;
    }

    .status-text.error {
      color: #ff4444;
      font-style: normal;
    }

    .status-text.warning {
      color: #ffaa00;
      font-style: normal;
    }

    .timer-bar {
      margin-top: 12px;
      width: 200px;
      height: 3px;
      background: #222;
      border-radius: 2px;
      overflow: hidden;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .timer-bar.visible {
      opacity: 1;
    }

    .timer-fill {
      height: 100%;
      width: 100%;
      background: linear-gradient(90deg, #00ffff, #ffaa00, #ff4444);
      border-radius: 2px;
      transition: none;
    }

    .subtitle {
      margin-top: 40px;
      font-size: 13px;
      color: #444;
      letter-spacing: 0.05em;
    }

    .hint {
      margin-top: 8px;
      font-size: 12px;
      color: #333;
      opacity: 0;
      transition: opacity 0.5s;
    }

    .hint.visible {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="orb-container">
    <div id="ring" class="ring"></div>
    <div id="orb" class="orb" title="Clique para falar com o Sam"></div>
  </div>
  <div id="status" class="status-text">Clique para falar</div>
  <div id="timerBar" class="timer-bar">
    <div id="timerFill" class="timer-fill"></div>
  </div>
  <div class="subtitle">Sam — Assistente pessoal IA</div>
  <div id="hint" class="hint">Dica: fale "busca no meu drive" ou "tem e-mail novo?"</div>

  <script>
    const orb = document.getElementById('orb');
    const ring = document.getElementById('ring');
    const statusText = document.getElementById('status');
    const timerBar = document.getElementById('timerBar');
    const timerFill = document.getElementById('timerFill');
    const hint = document.getElementById('hint');

    let recognition;
    let lastTranscript = "";
    let silenceTimeout;
    let falando = false;
    let processando = false;
    let micPermitido = false;
    let fetchController = null;
    let timerInterval = null;

    // Tempo máximo de espera do servidor (ms)
    // O DNS do DuckDNS pode levar até 10s, mais processamento n8n de 15-20s
    const TIMEOUT_MS = 35000;
    // Tempo de silêncio antes de enviar (ms)
    const SILENCE_MS = 1200;

    // Beep gerado localmente — sem dependência externa
    function playBeep(freq = 880, duration = 0.25) {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        // Reativa se suspenso (navegadores modernos)
        if (ctx.state === 'suspended') ctx.resume();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = freq;
        osc.type = 'sine';
        gain.gain.setValueAtTime(0.25, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + duration);
      } catch (e) {
        /* AudioContext pode não estar disponível */
      }
    }

    function setStatus(msg, mode = '') {
      statusText.textContent = msg;
      statusText.className = 'status-text';
      if (mode) statusText.classList.add(mode);
    }

    function hideHint() {
      hint.classList.remove('visible');
    }

    function showHint(delay = 0) {
      setTimeout(() => {
        if (!processando && !falando) {
          hint.classList.add('visible');
        }
      }, delay);
    }

    // Mostra barra de progresso regressiva
    function iniciarTimer() {
      timerBar.classList.add('visible');
      timerFill.style.width = '100%';
      timerFill.style.transition = 'none';
      // Força reflow
      void timerFill.offsetWidth;
      timerFill.style.transition = `width ${TIMEOUT_MS}ms linear`;
      timerFill.style.width = '0%';
    }

    function pararTimer() {
      timerBar.classList.remove('visible');
      if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
      }
    }

    async function pedirPermissaoMicrofone() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        stream.getTracks().forEach(t => t.stop());
        micPermitido = true;
        return true;
      } catch (e) {
        micPermitido = false;
        if (e.name === 'NotAllowedError' || e.name === 'PermissionDeniedError') {
          setStatus("Permissão de microfone negada. Libere nas configurações do navegador.", 'error');
        } else {
          setStatus("Microfone não encontrado ou indisponível.", 'error');
        }
        return false;
      }
    }

    async function startRecognition() {
      if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
        setStatus("Navegador não suporta reconhecimento de voz. Use Chrome.", 'error');
        return;
      }

      if (!micPermitido) {
        setStatus("Solicitando acesso ao microfone...", 'active');
        const ok = await pedirPermissaoMicrofone();
        if (!ok) return;
      }

      playBeep(880, 0.2);
      hideHint();

      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      recognition = new SpeechRecognition();
      recognition.lang = 'pt-BR';
      recognition.interimResults = true;
      recognition.continuous = true;
      recognition.maxAlternatives = 1;
      lastTranscript = "";

      recognition.onstart = () => {
        orb.classList.add('listening');
        ring.classList.add('listening');
        setStatus("Ouvindo...", 'active');
      };

      recognition.onresult = (event) => {
        for (let i = event.resultIndex; i < event.results.length; ++i) {
          if (event.results[i].isFinal) {
            lastTranscript = event.results[i][0].transcript;
          }
        }
        clearTimeout(silenceTimeout);
        silenceTimeout = setTimeout(stopRecognition, SILENCE_MS);
      };

      recognition.onerror = (event) => {
        console.error('Erro recognition:', event.error);
        orb.classList.remove('listening');
        ring.classList.remove('listening');

        if (event.error === 'not-allowed') {
          micPermitido = false;
          setStatus("Microfone bloqueado. Verifique as permissões do site.", 'error');
        } else if (event.error === 'no-speech') {
          setStatus("Nenhuma fala detectada. Tente novamente.", '');
          showHint(3000);
        } else if (event.error === 'aborted') {
          // Ignora — foi interrompido intencionalmente
        } else {
          setStatus("Erro: " + event.error, 'error');
        }
      };

      recognition.onend = () => {
        orb.classList.remove('listening');
        ring.classList.remove('listening');
      };

      try {
        recognition.start();
      } catch (e) {
        console.error('Erro ao iniciar recognition:', e);
        setStatus("Erro ao iniciar microfone. Tente novamente.", 'error');
      }
    }

    async function stopRecognition() {
      if (!recognition) return;

      try {
        recognition.stop();
      } catch (e) {
        /* Pode lançar erro se já parou */
      }

      orb.classList.remove('listening');
      ring.classList.remove('listening');

      if (!lastTranscript.trim()) {
        setStatus("Clique para falar");
        showHint(1000);
        return;
      }

      // Entra em modo de processamento
      processando = true;
      orb.classList.add('processing');
      ring.classList.add('processing');
      setStatus("Processando...", 'active');

      // Inicia timer regressivo
      iniciarTimer();

      // Cria AbortController para timeout
      fetchController = new AbortController();
      const timeoutId = setTimeout(() => {
        fetchController.abort();
        fetchController = null;
      }, TIMEOUT_MS);

      try {
        const response = await fetch("https://webhook.solutionai.duckdns.org/webhook/receber-audio", {
          method: "POST",
          mode: "cors",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ pergunta: lastTranscript.trim() }),
          signal: fetchController.signal
        });

        clearTimeout(timeoutId);
        fetchController = null;

        if (!response.ok) {
          throw new Error("Servidor retornou erro " + response.status);
        }

        // Verifica se o Content-Type indica áudio
        const contentType = response.headers.get('content-type') || '';
        if (!contentType.includes('audio') && !contentType.includes('octet-stream')) {
          throw new Error("Resposta inesperada do servidor");
        }

        setStatus("Preparando resposta...", 'active');

        const blob = await response.blob();

        // Valida se o blob tem tamanho mínimo (áudio válido)
        if (blob.size < 100) {
          throw new Error("Resposta de áudio vazia");
        }

        pararTimer();
        orb.classList.remove('processing');
        ring.classList.remove('processing');

        const audioURL = URL.createObjectURL(blob);

        if (falando) {
          console.warn("Já estou falando, ignorando nova resposta.");
          processando = false;
          return;
        }
        falando = true;
        processando = false;

        const audio = new Audio(audioURL);

        audio.onplay = () => {
          orb.classList.add('playing');
          ring.classList.add('playing');
          setStatus("Respondendo...", 'playing');
        };

        audio.onended = () => {
          falando = false;
          orb.classList.remove('playing');
          ring.classList.remove('playing');
          setStatus("Clique para falar");
          playBeep(660, 0.15);
          showHint(2000);
          // Limpa URL do objeto para liberar memória
          URL.revokeObjectURL(audioURL);
        };

        audio.onerror = (e) => {
          falando = false;
          orb.classList.remove('playing');
          ring.classList.remove('playing');
          orb.classList.add('error-state');
          setStatus("Erro ao reproduzir áudio.", 'error');
          setTimeout(() => {
            orb.classList.remove('error-state');
            setStatus("Clique para falar");
            showHint(2000);
          }, 3000);
          URL.revokeObjectURL(audioURL);
        };

        // Tenta reproduzir — se falhar (ex: interação do usuário necessária)
        try {
          await audio.play();
        } catch (playErr) {
          falando = false;
          orb.classList.remove('playing');
          ring.classList.remove('playing');
          orb.classList.add('error-state');
          setStatus("Clique novamente para ouvir a resposta.", 'warning');
          console.error("Erro ao reproduzir:", playErr);
          setTimeout(() => {
            orb.classList.remove('error-state');
            showHint(2000);
          }, 4000);
        }

      } catch (err) {
        clearTimeout(timeoutId);
        pararTimer();
        processando = false;
        falando = false;
        orb.classList.remove('processing');
        ring.classList.remove('processing');
        orb.classList.add('error-state');

        console.error("Erro:", err);

        // Mensagens específicas por tipo de erro
        if (err.name === 'AbortError') {
          setStatus("Servidor demorou demais. Toque na orb para tentar de novo.", 'error');
        } else if (err.name === 'TypeError' && err.message.includes('fetch')) {
          setStatus("Sem conexão com o servidor. Verifique sua internet.", 'error');
        } else if (err.message.includes('Failed to fetch') || err.message.includes('NetworkError')) {
          setStatus("Servidor offline ou conexão instável. Toque para tentar de novo.", 'error');
        } else {
          setStatus("Erro inesperado. Toque na orb para tentar de novo.", 'error');
        }

        // Mostra hint de retry
        setTimeout(() => {
          orb.classList.remove('error-state');
          setStatus("Toque na orb para falar");
          showHint(500);
        }, 5000);
      }
    }

    orb.addEventListener('click', () => {
      if (falando) return;
      if (processando) {
        // Se está processando, cancela a requisição
        if (fetchController) {
          fetchController.abort();
          fetchController = null;
        }
        pararTimer();
        processando = false;
        orb.classList.remove('processing');
        ring.classList.remove('processing');
        setStatus("Cancelado");
        setTimeout(() => {
          setStatus("Clique para falar");
          showHint(1000);
        }, 1500);
        return;
      }
      if (recognition && recognition.running) {
        stopRecognition();
      } else {
        startRecognition();
      }
    });

    // Mostra dica ao carregar
    setTimeout(() => showHint(2000), 1000);
  </script>
</body>
</html>
